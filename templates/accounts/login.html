{% extends 'base.html' %}
{% block title %}Login - SchoolMS{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h3 class="fw-bold text-center mb-4"><i class="bi bi-box-arrow-in-right me-2"></i>Login</h3>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
                        class="form-control {% if field.errors %}is-invalid{% endif %}"
                        {% if field.value %}value="{{ field.value }}"{% endif %}>
                    {% for error in field.errors %}<div class="invalid-feedback">{{ error }}</div>{% endfor %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100 mt-2">Login</button>
            </form>
            <p class="text-center mt-3 mb-0">New student? <a href="{% url 'register' %}">Apply for Admission</a></p>
        </div>
    </div>
</div>
<p class="text-center mt-3 mb-0">
    <a href="{% url 'password-reset' %}">Forgot Password?</a>
</p>
{% endblock %}
